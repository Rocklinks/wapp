app = "sathya-messenger"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  DATA_DIR = "/data"
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "sathya_data"
  destination = "/data"
  initial_size = "1gb"
